<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>RICOCHET RUMBLE</title>
<style>
  :root{
    --bg:#06080f; --ink:#eef2ff; --dim:#8b93a8; --line:#1c2233;
    --p1:#ff2d55; --p2:#00e5ff; --gold:#ffcf3f;
    --disp:system-ui,-apple-system,"Segoe UI",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overscroll-behavior:none}
  body{background:var(--bg);color:var(--ink);font-family:var(--disp);
    overflow:hidden;user-select:none;-webkit-user-select:none;touch-action:none}
  #stage{position:fixed;inset:0;overflow:hidden;touch-action:none}
  #shake{position:absolute;inset:0}
  #shake.shaking{animation:shk .3s linear}
  @keyframes shk{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,5px)}
    40%{transform:translate(7px,-6px)}60%{transform:translate(-5px,-3px)}80%{transform:translate(4px,4px)}}
  #grid{position:absolute;inset:0;pointer-events:none;opacity:.4;
    background:linear-gradient(rgba(140,160,220,.05) 1px,transparent 1px),
      linear-gradient(90deg,rgba(140,160,220,.05) 1px,transparent 1px);
    background-size:56px 56px;
    mask-image:radial-gradient(80% 80% at 50% 50%,#000 30%,transparent 100%);
    -webkit-mask-image:radial-gradient(80% 80% at 50% 50%,#000 30%,transparent 100%)}
  #scan{position:absolute;inset:0;pointer-events:none;opacity:.25;z-index:8;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.2) 0 2px,transparent 2px 5px)}
  #game{position:absolute;inset:0;z-index:2}
  #flash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:7;mix-blend-mode:screen}
  #flash.on{animation:fl .4s ease-out}
  @keyframes fl{0%{opacity:.3}100%{opacity:0}}

  #arena{position:absolute;inset:0;z-index:4;display:flex;align-items:center;justify-content:center;
    pointer-events:none;overflow-y:auto;padding:14px}
  #announce{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;
    pointer-events:none;opacity:0;transition:opacity .1s}
  #announce.show{opacity:1}
  .abox{text-align:center;animation:punch .28s cubic-bezier(.2,1.6,.4,1) both;
    background:rgba(4,6,12,.72);padding:clamp(14px,3vh,32px) clamp(22px,6vw,64px);
    border-top:1px solid var(--line);border-bottom:1px solid var(--line);max-width:94vw}
  @keyframes punch{from{transform:scale(1.5);opacity:0}to{transform:scale(1);opacity:1}}
  .eyebrow{font-family:var(--mono);color:var(--dim);letter-spacing:.4em;font-size:clamp(10px,1.4vw,14px);margin-bottom:8px}
  .gtitle{font-weight:900;font-style:italic;font-size:clamp(34px,7vw,76px);letter-spacing:-.02em;
    line-height:.95;text-transform:uppercase;text-shadow:3px 3px 0 rgba(255,45,85,.4),-3px -3px 0 rgba(0,229,255,.36)}
  .gtip{margin-top:10px;color:var(--dim);font-size:clamp(13px,1.8vw,18px);line-height:1.45}
  .gtip b{color:var(--ink)}
  .rtitle{font-weight:900;font-style:italic;font-size:clamp(26px,5.4vw,56px);letter-spacing:-.02em;
    line-height:1;text-transform:uppercase;text-shadow:0 0 26px currentColor}
  .rsub{margin-top:10px;font-family:var(--mono);color:var(--dim);font-size:clamp(12px,1.6vw,16px)}

  .menu{display:flex;flex-direction:column;align-items:center;gap:clamp(12px,2.6vh,24px);
    text-align:center;padding:16px;pointer-events:auto;max-height:100%;overflow-y:auto;width:min(96vw,860px)}
  .logo{font-weight:900;font-style:italic;text-transform:uppercase;line-height:.86;letter-spacing:-.03em;
    font-size:clamp(42px,9vw,104px)}
  .logo .l1{color:var(--p1);text-shadow:0 0 34px rgba(255,45,85,.6);display:block}
  .logo .l2{color:var(--p2);text-shadow:0 0 34px rgba(0,229,255,.55);display:block}
  .tag{font-family:var(--mono);color:var(--dim);letter-spacing:.2em;font-size:clamp(10px,1.5vw,15px)}
  .modes{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .mbtn{font-family:var(--disp);cursor:pointer;background:rgba(10,14,24,.9);color:var(--ink);
    border:1px solid var(--line);padding:13px 20px;text-align:left;font-size:clamp(14px,1.9vw,18px);
    font-weight:900;font-style:italic;letter-spacing:.03em;transition:border-color .15s,transform .15s}
  .mbtn:hover{transform:translateY(-2px)}
  .mbtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
  .mbtn b{display:inline-block;background:var(--ink);color:#04060c;padding:2px 9px;margin-right:9px;font-style:normal}
  .mbtn span{display:block;margin-top:5px;font-family:var(--mono);font-weight:400;font-style:normal;
    color:var(--dim);font-size:11px;letter-spacing:.06em}
  .mbtn.b1:hover{border-color:var(--p1)} .mbtn.b2:hover{border-color:var(--p2)} .mbtn.bg:hover{border-color:var(--gold)}
  .mbtn.sm{padding:10px 16px;font-size:14px}
  .note{font-family:var(--mono);color:#4a5164;font-size:10px;letter-spacing:.1em;max-width:82vw;line-height:1.8}
  .acctchip{cursor:pointer;background:rgba(10,14,24,.9);border:1px solid var(--line);color:var(--ink);
    padding:9px 16px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;max-width:520px;width:100%;
    display:flex;align-items:center;gap:10px;justify-content:center;transition:border-color .15s}
  .acctchip:hover{border-color:var(--p2)}
  .acctchip b{font-style:normal;font-weight:900;font-family:var(--disp);white-space:nowrap}
  .acctchip span{color:var(--dim)}

  /* loadout */
  .panel{width:min(96vw,880px);pointer-events:auto;display:flex;flex-direction:column;gap:14px}
  .prow{display:flex;gap:14px;flex-wrap:wrap}
  .card{background:rgba(10,14,24,.9);border:1px solid var(--line);padding:16px;flex:1;min-width:260px}
  .card h3{font-family:var(--mono);font-size:12px;letter-spacing:.2em;color:var(--dim);
    text-transform:uppercase;margin-bottom:12px;text-align:left;font-weight:700}
  .stat{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .stat .nm{width:104px;text-align:left;font-family:var(--mono);font-size:12px;letter-spacing:.08em}
  .bar{flex:1;height:12px;background:#0a0e1a;border:1px solid var(--line);position:relative;overflow:hidden}
  .bar i{position:absolute;inset:0;transform-origin:left;background:var(--gold);transition:transform .12s}
  .sbtn{cursor:pointer;width:26px;height:26px;border:1px solid var(--line);background:#0a0e1a;color:var(--ink);
    font-weight:900;font-size:16px;line-height:1}
  .sbtn:hover{border-color:var(--gold)} .sbtn:disabled{opacity:.3;cursor:not-allowed}
  .ptsline{font-family:var(--mono);font-size:12px;color:var(--gold);letter-spacing:.1em;text-align:left}
  .slot{display:flex;align-items:center;gap:12px;background:#0a0e1a;border:1px solid var(--line);
    padding:11px 13px;cursor:pointer;transition:border-color .15s;text-align:left}
  .slot:hover{border-color:var(--gold)}
  .slot .ic{font-size:22px;width:30px;text-align:center}
  .slot .nm2{font-weight:900;font-style:italic;font-size:15px}
  .slot .mods{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:.04em}
  .invlist{display:flex;flex-direction:column;gap:7px;max-height:36vh;overflow-y:auto}
  .item{display:flex;align-items:center;gap:11px;background:#0a0e1a;border:1px solid var(--line);
    border-left-width:4px;padding:9px 12px;cursor:pointer;text-align:left;transition:transform .1s}
  .item:hover{transform:translateX(2px)}
  .item .ic{font-size:20px;width:26px;text-align:center}
  .item .col{flex:1;min-width:0}
  .item .nm2{font-weight:900;font-style:italic;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item .mods{font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.03em}
  .item .eqp{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.1em}
  .rr{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:2px 6px;border:1px solid currentColor}
  .modewrap{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .seg{display:inline-flex;border:1px solid var(--line);overflow:hidden}
  .seg button{cursor:pointer;background:#0a0e1a;color:var(--dim);border:0;padding:9px 16px;
    font-family:var(--disp);font-weight:900;font-style:italic;font-size:14px}
  .seg button.on{background:var(--ink);color:#04060c}
  .lvlbar{display:flex;align-items:center;gap:12px;width:100%;background:rgba(10,14,24,.9);
    border:1px solid var(--line);padding:10px 14px}
  .lvlbadge{font-weight:900;font-style:italic;color:var(--gold);font-size:clamp(14px,1.9vw,18px);white-space:nowrap}
  .xptrack{flex:1;height:12px;background:#0a0e1a;border:1px solid var(--line);overflow:hidden}
  .xptrack i{display:block;height:100%;transform-origin:left;
    background:linear-gradient(90deg,#ffcf3f,#ff9f1c);transition:transform .3s}
  .xptext{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.06em;white-space:nowrap}
  .credpill{font-family:var(--mono);font-weight:700;color:var(--gold);font-size:13px;
    border:1px solid var(--line);padding:4px 10px;white-space:nowrap}
  .shopgrid{display:flex;flex-direction:column;gap:8px;max-height:44vh;overflow-y:auto}
  .shopitem{display:flex;align-items:center;gap:11px;background:#0a0e1a;border:1px solid var(--line);
    border-left-width:4px;padding:10px 13px;text-align:left}
  .shopitem .ic{font-size:20px;width:26px;text-align:center}
  .shopitem .col{flex:1;min-width:0}
  .shopitem .nm2{font-weight:900;font-style:italic;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .shopitem .mods{font-family:var(--mono);font-size:10px;color:var(--dim)}
  .buybtn{cursor:pointer;background:var(--gold);color:#04060c;border:0;font-family:var(--disp);font-weight:900;
    font-style:italic;padding:8px 13px;font-size:13px;white-space:nowrap}
  .buybtn:disabled{background:#2a3348;color:#5a6178;cursor:not-allowed}
  .buybtn.sold{background:transparent;color:var(--dim);border:1px solid var(--line)}
  .mbtn.locked{opacity:.55;cursor:not-allowed}
  .mbtn.locked:hover{transform:none;border-color:var(--line)}

  /* net */
  .netwrap{display:flex;flex-direction:column;gap:12px;width:min(94vw,560px);pointer-events:auto}
  .netlbl{font-family:var(--mono);color:var(--dim);letter-spacing:.2em;font-size:11px;text-align:left}
  .netrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .netstat{font-family:var(--mono);color:var(--gold);font-size:12px;letter-spacing:.1em;min-height:16px;line-height:1.7}
  .netstat a{color:var(--gold)}
  .namebox{flex:1;min-width:170px;background:#0a0e1a;border:1px solid var(--line);color:var(--ink);
    font-family:var(--mono);font-size:13px;letter-spacing:.06em;padding:12px 14px;user-select:text;-webkit-user-select:text}
  .namebox:focus{outline:1px solid var(--gold)}
  .roomlist{display:flex;flex-direction:column;gap:8px;max-height:34vh;overflow-y:auto}
  .roomrow{display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer;
    background:#0a0e1a;border:1px solid var(--line);color:var(--ink);padding:13px 16px;
    font-family:var(--mono);font-size:13px;letter-spacing:.08em;text-align:left;transition:border-color .15s,transform .15s}
  .roomrow:hover{border-color:var(--p2);transform:translateY(-1px)}
  .roomrow .rjoin{color:var(--p2);font-weight:700;white-space:nowrap}

  @media (prefers-reduced-motion:reduce){#shake.shaking,.abox{animation:none}}
</style>

<div id="stage">
  <div id="shake">
    <div id="grid"></div>
    <canvas id="game"></canvas>
    <div id="arena"></div>
    <div id="announce"></div>
    <div id="scan"></div>
  </div>
  <div id="flash"></div>
</div>

<script>
'use strict';
/* ================= helpers ================= */
const $ = s => document.querySelector(s);
const rand = (a,b) => a + Math.random()*(b-a);
const irand = (a,b) => Math.floor(rand(a, b+1));
const pick = a => a[irand(0, a.length-1)];
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const TAU = Math.PI*2;
function angDiff(a,b){ return ((b - a + Math.PI*3) % TAU) - Math.PI; }
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isTouch = matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

const WORLD = { w: 2600, h: 1700 };
const MAXP = 8;
const FFA_TARGET = 12;
const TEAM_TARGET = 30;
const RESPAWN = 1.7;
const FFA_COLORS = ['#ff2d55','#00e5ff','#ffcf3f','#3ddc84','#b56bff','#ff9f1c','#ff5c8a','#4dabff'];
const TEAM_COLORS = ['#ff3b5c','#25c9ff'];
const BOT_NAMES = ['Vex','Nyx','Rook','Zeal','Kilo','Onyx','Pyre','Jinx','Halo','Crux','Wisp','Dax','Echo','Sable'];

let timers = [];
function after(ms, fn){ const id = setTimeout(fn, ms); timers.push(id); return id; }
function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

/* ================= audio ================= */
let AC = null, master = null;
function audioInit(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.12; master.connect(AC.destination);
  }catch(e){ AC = null; } }
  if(AC && AC.state === 'suspended') AC.resume();
}
function tone(f, dur=0.09, type='square', vol=1, slideTo=null, delay=0){
  if(!AC || !master) return;
  const t = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(f, t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t+dur);
  g.gain.setValueAtTime(vol*0.5, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
  o.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.03);
}
const FXMAP = {};
function fxWrap(name, fn){ FXMAP[name] = fn; return (...a) => { fn(...a); if(mode === 'host') netBroadcast({t:'fx', n:name, a}); }; }
const sfxShoot  = () => tone(720, 0.07, 'square', 0.4, 200);
const sfxBounce = () => tone(300, 0.04, 'square', 0.3, 210);
const sfxKill   = fxWrap('kl', () => { tone(150, 0.3, 'sawtooth', 0.8, 40);
  [0,4,7,12].forEach((s,i)=>tone(494*Math.pow(2,s/12), 0.09, 'square', 0.6, null, 0.05+i*0.045)); });
const sfxDie    = fxWrap('di', () => tone(200, 0.3, 'sawtooth', 0.7, 70));
const sfxSpawn  = fxWrap('sp', () => { tone(500, 0.08, 'triangle', 0.5, 900); });
const sfxGo     = () => { tone(660, 0.07); tone(990, 0.12, 'square', 1, null, 0.06); };
const sfxPick   = () => [0,7,12].forEach((s,i)=>tone(784*Math.pow(2,s/12), 0.06, 'triangle', 0.7, null, i*0.045));
const sfxWin    = () => [0,4,7,12,16,19,24].forEach((s,i)=>tone(392*Math.pow(2,s/12), 0.15, 'triangle', 0.9, null, i*0.085));
const sfxLoot   = r => [0,4,7].forEach((s,i)=>tone((440+r*90)*Math.pow(2,s/12), 0.12, 'triangle', 0.8, null, i*0.08));

/* ================= canvas ================= */
const cv = $('#game'), ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){ DPR = Math.min(2, window.devicePixelRatio||1);
  W = innerWidth; H = innerHeight; cv.width = W*DPR; cv.height = H*DPR; cv.style.width=W+'px'; cv.style.height=H+'px'; }
addEventListener('resize', resize); resize();

/* ================= save / progression ================= */
const DEFAULT_ALLOC = { spd:2, rof:2, vel:2, mag:1, rld:1, vit:2 };
/* ---- leveling / exp ---- */
function expToNext(L){ return 90 + (L-1)*55; }             // exp needed from level L → L+1
function levelFromExp(exp){ let L=1, need=expToNext(1), acc=0;
  while(exp >= acc+need && L<200){ acc+=need; L++; need=expToNext(L); } return L; }
function expInfo(exp){ let L=1, need=expToNext(1), acc=0;
  while(exp >= acc+need && L<200){ acc+=need; L++; need=expToNext(L); }
  return { level:L, into: exp-acc, need, frac: clamp((exp-acc)/need,0,1) }; }
function expForKill(lvl){ return 16 + (lvl||1)*8; }        // more exp for downing higher-level foes
let save = null;
function idcSync(){ let mx = 0; for(const it of save.inv) if(it.id > mx) mx = it.id; idc = mx + 1; }
function migrateSave(){
  if(!save.equip) save.equip = {weapon:null, armor:null};
  if(!save.alloc) save.alloc = {...DEFAULT_ALLOC};
  for(const k in DEFAULT_ALLOC) if(typeof save.alloc[k] !== 'number') save.alloc[k] = DEFAULT_ALLOC[k];
  for(const k of ['kills','wins','matches','exp','credits','saved']) if(typeof save[k] !== 'number') save[k] = 0;
  if(!Array.isArray(save.inv)) save.inv = [];
  if(!save.pid) save.pid = 'p' + Math.random().toString(36).slice(2,11);   // stable device id for the ladder
  if(!save.handle) save.handle = 'Player' + irand(1000,9999);
  if(typeof save.rating !== 'number') save.rating = 1000;
  save.level = levelFromExp(save.exp);                      // level is always derived from exp
  // drop dangling equip references
  if(save.equip.weapon != null && !save.inv.some(i=>i.id===save.equip.weapon)) save.equip.weapon = null;
  if(save.equip.armor  != null && !save.inv.some(i=>i.id===save.equip.armor))  save.equip.armor  = null;
}
function loadSave(){
  try{ const s = JSON.parse(localStorage.getItem('rr_save_v2')); if(s && s.inv){ save = s; migrateSave(); idcSync(); return; } }catch(e){}
  save = { inv:[], equip:{weapon:null, armor:null}, alloc:{...DEFAULT_ALLOC}, kills:0, wins:0, matches:0, exp:0, level:1, credits:60, saved:0,
    pid:'p'+Math.random().toString(36).slice(2,11), handle:'Player'+irand(1000,9999), rating:1000 };
  const w = rollItem('weapon', 0, 'pistol'), a = rollItem('armor', 0, 'vest');
  save.inv.push(w, a); save.equip.weapon = w.id; save.equip.armor = a.id;
  idcSync(); persist();
}
function persist(){ try{ localStorage.setItem('rr_save_v2', JSON.stringify(save)); }catch(e){} cloudSync(); }
/* ---- accounts (username + password, cloud save) ---- */
const ACCT_URL = 'https://rr-negotiate-qrwiob.azurewebsites.net/api/account';
let account = null;   // { token, username, handle, aid, rating } when signed in
function loadToken(){ try{ return localStorage.getItem('rr_token'); }catch(e){ return null; } }
function storeToken(t){ try{ t ? localStorage.setItem('rr_token', t) : localStorage.removeItem('rr_token'); }catch(e){} }
async function acctCall(action, extra){
  try{ const r = await fetch(ACCT_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(Object.assign({action}, extra)) });
    let j = {}; try{ j = await r.json(); }catch(e){} return { status:r.status, j }; }
  catch(e){ return { status:0, j:{ error:'network unreachable' } }; }
}
function applyCloudSave(cloud){
  if(cloud && typeof cloud === 'object'){ save = cloud; migrateSave(); idcSync(); }
  if(account) save.handle = account.handle;
  persistLocal();
}
function persistLocal(){ try{ localStorage.setItem('rr_save_v2', JSON.stringify(save)); }catch(e){} }
async function tryResume(){
  const t = loadToken(); if(!t) return;
  const { status, j } = await acctCall('me', { token:t });
  if(status===200 && j.account){ account = Object.assign({ token:t }, j.account); applyCloudSave(j.save); refreshRating(); }
  else if(status===401){ storeToken(null); }
}
let cloudTimer = null;
function cloudSync(){
  if(!account) return;
  clearTimeout(cloudTimer);
  cloudTimer = setTimeout(async ()=>{
    const { status } = await acctCall('save', { token:account.token, save, handle:account.handle });
    if(status===401){ account = null; storeToken(null); }   // don't touch account.rating — it lives in the ranks table
  }, 1500);
}
async function refreshRating(){   // rating is authoritative in the ranks table, not the account row
  if(!account) return;
  try{ const r = await fetch(RANK_URL+'?id='+encodeURIComponent(account.aid), {cache:'no-store'});
    const j = await r.json(); if(typeof j.rating==='number') account.rating = j.rating; }catch(e){}
}
function logout(){ account = null; storeToken(null); }
const acctId = () => account ? account.aid : save.pid;
const acctHandle = () => account ? account.handle : save.handle;
const equippedWeapon = () => save.inv.find(i => i.id === save.equip.weapon) || null;
const equippedArmor  = () => save.inv.find(i => i.id === save.equip.armor) || null;

/* ================= loot ================= */
const RARITIES = [
  { k:'common',    c:'#dfe6f2', w:46, s:1.0,  price:40   },   // white
  { k:'uncommon',  c:'#3ddc84', w:28, s:1.4,  price:110  },   // green
  { k:'unique',    c:'#3aa0ff', w:16, s:1.85, price:260  },   // blue
  { k:'rare',      c:'#b56bff', w:7,  s:2.35, price:560  },   // purple

const W_PREFIX = ['Rusty','Standard','Tuned','Vicious','Prime','Apex','Mythic'];

const W_SUFFIX = ['of Speed','of Fury','of the Bank','of Reach','of Excess','of the Duelist',''];

let idc = 1;
function rollRarity(minTier, maxTier){
  minTier = minTier || 0; maxTier = (maxTier == null) ? RARITIES.length-1 : maxTier;
  minTier = clamp(minTier, 0, maxTier);
  const pool = RARITIES.slice(minTier, maxTier+1);
  const tot = pool.reduce((a,r)=>a+r.w,0); let x = rand(0, tot);
  for(let i=0;i<pool.length;i++){ if((x -= pool[i].w) <= 0) return minTier + i; }
  return minTier;
}
function rollItem(kind, minTier, forceBase, maxTier){
  const rr = rollRarity(minTier, maxTier), R = RARITIES[rr];
  const bonus = (R.s - 1);
  const mods = {};

    const base = forceBase || pick(Object.keys(WEAPONS));
    // distribute rarity budget across rof / vel / mag
    const axes = ['rof','vel','mag'];
    const nMods = clamp(1 + Math.floor(rr*0.9), 1, 3);
    for(let i=0;i<nMods;i++){ const ax = axes[(i + irand(0,2)) % 3];
      mods[ax] = (mods[ax]||0) + +(bonus * rand(0.25,0.5)).toFixed(3); }
    const pre = W_PREFIX[Math.min(rr + (Math.random()<0.4?1:0), 6)];
    const suf = Math.random() < 0.4 + rr*0.12 ? pick(W_SUFFIX) : '';
    return { id: idc++, kind, base, rr, name: `${pre} ${WEAPONS[base].name} ${suf}`.replace(/\s+/g,' ').trim(), mods };
  } else {
    const base = forceBase || pick(Object.keys(ARMORS));
    const axes = ['shield','regen','spd','vit'];
    const nMods = clamp(1 + Math.floor(rr*0.9), 1, 3);
    for(let i=0;i<nMods;i++){ const ax = axes[(i + irand(0,3)) % 4];
      const scale = ax === 'shield' ? rand(0.12,0.3) : rand(0.06,0.14);
      mods[ax] = (mods[ax]||0) + +(bonus * scale).toFixed(3); }
    const pre = A_PREFIX[Math.min(rr + (Math.random()<0.4?1:0), 6)];
    const suf = Math.random() < 0.4 + rr*0.12 ? pick(A_SUFFIX) : '';
    return { id: idc++, kind, base, rr, name: `${pre} ${ARMORS[base].name} ${suf}`.replace(/\s+/g,' ').trim(), mods };
  }
}
function modLabel(it){
  const m = it.mods, parts = [];
  const pct = v => (v>0?'+':'') + Math.round(v*100) + '%';
  if(it.kind === 'weapon'){
    if(m.rof) parts.push('RoF '+pct(m.rof));
    if(m.vel) parts.push('Vel '+pct(m.vel));
    if(m.mag) parts.push('Mag '+pct(m.mag));
    parts.unshift(WEAPONS[it.base].pattern);
  } else {
    if(m.shield) parts.push('Shield +'+m.shield.toFixed(2)+'s');
    if(m.regen) parts.push('Regen '+pct(m.regen));
    if(m.spd) parts.push('Speed '+pct(m.spd));
    if(m.vit) parts.push('Vit '+pct(m.vit));

}

/* ================= loadout resolution ================= */
function resolveLoadout(alloc, wItem, aItem){
  const A = alloc || DEFAULT_ALLOC;
  const wm = wItem ? wItem.mods : {}, am = aItem ? aItem.mods : {};
  const wbase = wItem ? WEAPONS[wItem.base] : WEAPONS.pistol;
  const abase = aItem ? ARMORS[aItem.base] : {shield:0,regen:0,spd:0};
  const st = 0.07;
  const spdM = 1 + (A.spd||0)*st + (abase.spd||0) + (am.spd||0);
  const rofM = 1 + (A.rof||0)*st + (wm.rof||0);
  const velM = 1 + (A.vel||0)*st + (wm.vel||0);
  const magM = 1 + (A.mag||0)*st + (wm.mag||0);
  const rldM = 1 + (A.rld||0)*st + (abase.regen||0) + (am.regen||0);
  const vitM = 1 + (A.vit||0)*st + (am.vit||0);
  const shieldBonus = (abase.shield||0) + (am.shield||0);
  return {
    accel: 2600 * spdM,
    maxV: 300 * spdM,
    cdBase: wbase.cd / rofM,
    bulletSpeed: 560 * velM * wbase.vel,
    maxAmmo: clamp(Math.round(wbase.mag * magM), 1, 9),
    regenTime: 0.72 / rldM,
    spawnShield: Math.max(0.5, 0.9 * vitM + shieldBonus),
    wbase
  };
}

function makeSpawns(){
  const pts = [], cx = WORLD.w/2, cy = WORLD.h/2, rx = WORLD.w*0.4, ry = WORLD.h*0.38;
  for(let i=0;i<MAXP;i++){ const a = -Math.PI/2 + i/MAXP*TAU;
    pts.push({ x: cx + Math.cos(a)*rx, y: cy + Math.sin(a)*ry }); }
  return pts;
}
let spawns = [];
function farSpawn(team){
  // pick spawn maximizing distance to nearest live enemy
  let best = spawns[0], bestD = -1;
  for(const s of spawns){
    let d = 1e9;
    for(const p of players){ if(!p || !p.alive) continue; if(team>=0 && p.team===team) continue;
      d = Math.min(d, Math.hypot(p.x-s.x, p.y-s.y)); }
    if(d > bestD){ bestD = d; best = s; }
  }
  return best;
}
function rectsOverlap(a,b,pad){ return a.x-pad < b.x+b.w && a.x+a.w+pad > b.x && a.y-pad < b.y+b.h && a.y+a.h+pad > b.y; }
function genWalls(){
  walls = [];
  const cx = WORLD.w/2, cy = WORLD.h/2;
  let tries = 0;
  while(walls.length < 16 && tries < 500){
    tries++;
    const vert = Math.random() < 0.5;
    const w = vert ? irand(28,44) : irand(150,320);
    const h = vert ? irand(150,320) : irand(28,44);
    const x = rand(120, WORLD.w/2 - 60 - w);
    const y = rand(120, WORLD.h - 120 - h);
    const r1 = {x,y,w,h};
    const rcx = x+w/2, rcy = y+h/2;
    if(Math.hypot(rcx-cx, rcy-cy) < 190) continue;
    if(spawns.some(s => Math.hypot(s.x-rcx, s.y-rcy) < 170)) continue;
    const r2 = { x: 2*cx-(x+w), y: 2*cy-(y+h), w, h };  // point-mirror for symmetry
    if(walls.some(o => rectsOverlap(o,r1,60) || rectsOverlap(o,r2,60))) continue;
    if(rectsOverlap(r1,r2,60)) continue;
    walls.push(r1, r2);
  }
}
function circleRectPush(px, py, r, rc){
  const nx = clamp(px, rc.x, rc.x+rc.w), ny = clamp(py, rc.y, rc.y+rc.h);
  const dx = px-nx, dy = py-ny, d2 = dx*dx + dy*dy;

  const d = Math.sqrt(d2), k = (r-d)/d; return {x: dx*k, y: dy*k};
}
function losBlocked(x0,y0,x1,y1){
  const d = Math.hypot(x1-x0, y1-y0), steps = Math.ceil(d/40);
  for(let i=1;i<steps;i++){ const x = x0+(x1-x0)*i/steps, y = y0+(y1-y0)*i/steps;
    for(const wl of walls) if(x > wl.x && x < wl.x+wl.w && y > wl.y && y < wl.y+wl.h) return true; }
  return false;
}

function randBotAlloc(){ const a={spd:0,rof:0,vel:0,mag:0,rld:0,vit:0}, ks=Object.keys(a);

function nextWave(){
  if(!campaign) return;
  campaign.wave++;
  if(campaign.wave > campaign.maxWave){ campaignEnd(true); return; }
  const w = campaign.wave, boss = (w === campaign.maxWave);
  const count = Math.round((5 + w*3) * (0.7 + 0.34*campaign.np));   // scale horde with player count
  showAnnounce(`<div class="eyebrow">WAVE ${w} / ${campaign.maxWave}${boss?' · BOSS':''}</div>
    <div class="gtitle" style="color:${boss?'#ff9f1c':'var(--p1)'}">${boss?'THE BEHEMOTH':'Wave '+w}</div>`, 1500);
  campaign.spawning = true;                       // block wave-clear until the whole batch has spawned
  let last = 0;
  for(let i=0;i<count;i++){ const d = 400 + i*80; last = Math.max(last, d); after(d, ()=>{ if(campaign && state==='play') spawnZombie(save.level + w, false); }); }
  if(boss){ const n = campaign.np>2?2:1; for(let k=0;k<n;k++){ const d = 900+k*300; last = Math.max(last, d); after(d, ()=>{ if(campaign && state==='play') spawnZombie(save.level + w + 6, true); }); } }

function playerInputZ(p){

function respawnZ(p){

    for(const z of zombies){ if(!z.alive) continue; d=Math.min(d, Math.hypot(z.x-s.x,z.y-s.y)); } if(d>bd){ bd=d; best=s; } }

function stepPlayerZ(p, dt){

  const inp = playerInputZ(p); p.inX=inp.x; p.inY=inp.y; p.wantShoot=!!inp.s;
  if(p.inX||p.inY){ const want=Math.atan2(p.inY,p.inX); p.aim += clamp(angDiff(p.aim,want), -16*dt, 16*dt); }
  if(p.burst>0){ p.burstT-=dt; if(p.burstT<=0){ p.burstT=0.06; p.burst--; const spd=p.ld.bulletSpeed;

  p.x=clamp(p.x,p.r,WORLD.w-p.r); p.y=clamp(p.y,p.r,WORLD.h-p.r);
  for(const wl of walls){ const q=circleRectPush(p.x,p.y,p.r,wl); if(q){ p.x+=q.x; p.y+=q.y; if(q.x)p.vx=0; if(q.y)p.vy=0; } }

function updateZombies(dt){

      if(c.converting>0){ c.converting-=dt; if(c.converting<=0){ c.alive=false; spark(c.x,c.y,'#7cff9b',12);
        zombies.push(makeZombie(c.x,c.y, save.level+campaign.wave, false)); } continue; }
      let zn=null, zd=1e9; for(const z of zombies){ if(!z.alive) continue; const d=Math.hypot(z.x-c.x,z.y-c.y); if(d<zd){ zd=d; zn=z; } }

      c.vx*=Math.max(0,1-5*dt); c.vy*=Math.max(0,1-5*dt); c.x+=c.vx*dt; c.y+=c.vy*dt;
      c.x=clamp(c.x,c.r,WORLD.w-c.r); c.y=clamp(c.y,c.r,WORLD.h-c.r);
      for(const wl of walls){ const p=circleRectPush(c.x,c.y,c.r,wl); if(p){ c.x+=p.x; c.y+=p.y; } }
    }

      let tx, ty;
      if(cn){ tx=cn.x; ty=cn.y; }
      else { let pn=null, pd=1e9; for(const p of players){ if(!p||!p.alive) continue; const d=Math.hypot(p.x-z.x,p.y-z.y); if(d<pd){ pd=d; pn=p; } }
        if(pn){ tx=pn.x; ty=pn.y; } else { tx=WORLD.w/2; ty=WORLD.h/2; } }
      const a=Math.atan2(ty-z.y, tx-z.x); z.vx += Math.cos(a)*z.speed*5*dt; z.vy += Math.sin(a)*z.speed*5*dt;
      const zs=Math.hypot(z.vx,z.vy); if(zs>z.speed){ const k=z.speed/zs; z.vx*=k; z.vy*=k; }
      z.x+=z.vx*dt; z.y+=z.vy*dt; z.x=clamp(z.x,z.r,WORLD.w-z.r); z.y=clamp(z.y,z.r,WORLD.h-z.r);
      for(const wl of walls){ const p=circleRectPush(z.x,z.y,z.r,wl); if(p){ z.x+=p.x; z.y+=p.y; } }
      if(cn && cd < z.r+cn.r+2 && cn.converting<=0){ cn.converting = 0.85; }
      for(const p of players){ if(p && p.alive && p.shield<=0 && Math.hypot(p.x-z.x,p.y-z.y) < z.r+p.r){ playerDieZ(p); break; } }
    }
    // ---- bullets (all players) vs walls + zombies ----
    for(const bl of bullets){ bl.px=bl.x; bl.py=bl.y;
      for(let s=0;s<2 && bl.life>0;s++){ const h=dt/2; bl.x+=bl.vx*h; bl.y+=bl.vy*h;
        if(bl.x<bl.r){bl.x=bl.r;bl.vx=Math.abs(bl.vx);bl.b++;sfxBounce();} else if(bl.x>WORLD.w-bl.r){bl.x=WORLD.w-bl.r;bl.vx=-Math.abs(bl.vx);bl.b++;sfxBounce();}
        if(bl.y<bl.r){bl.y=bl.r;bl.vy=Math.abs(bl.vy);bl.b++;sfxBounce();} else if(bl.y>WORLD.h-bl.r){bl.y=WORLD.h-bl.r;bl.vy=-Math.abs(bl.vy);bl.b++;sfxBounce();}
        for(const wl of walls){ const p=circleRectPush(bl.x,bl.y,bl.r,wl); if(p){ bl.x+=p.x; bl.y+=p.y; if(Math.abs(p.x)>Math.abs(p.y))bl.vx=-bl.vx; else bl.vy=-bl.vy; bl.b++; sfxBounce(); } }
        if(bl.b>bl.maxB){ bl.life=0; spark(bl.x,bl.y,bl.c,5); }
        for(const z of zombies){ if(!z.alive||bl.life<=0) continue;
          if(Math.hypot(z.x-bl.x,z.y-bl.y) < z.r+bl.r){ bl.life=0;
            if(z.hp>1){ z.hp--; spark(bl.x,bl.y,'#ff6b6b',7); }
            else { z.alive=false; burst(z.x,z.y, z.boss?'#ff9f1c':'#8bd67a', z.boss?64:22); sfxDie();
              const ow = players[bl.owner]; if(ow){ ow.kills++; ow.matchExp += expForKill(z.level) * (z.boss?5:1); }
              if(z.boss){ shake(); flashScreen('#ff9f1c'); pushFeed('THE BEHEMOTH FALLS'); }
              else if(Math.random()<0.3) pushFeed(`zombie down`); } } }
      }
      bl.life-=dt;
    }
    bullets = bullets.filter(b=>b.life>0);
    zombies = zombies.filter(z=>z.alive);
    // ---- win / lose / wave advance ----
    const alive = citizens.filter(c=>c.alive).length;
    if(alive===0){ campaignEnd(false); }
    else if(campaign.wave>=1 && !campaign.spawning && zombies.length===0 && !citizens.some(c=>c.converting>0)){
      campaign.waveClearedT += dt;
      if(campaign.waveClearedT > 1.2){ campaign.waveClearedT = 0; nextWave(); }
    } else campaign.waveClearedT = 0;
  }
  for(const f of feed) f.t += dt;
  updateParts(dt); updateCamera(dt);
}

  const saved = citizens.filter(c=>c.alive).length;

function onKill(victim, killer, banked){
  if(state !== 'play') return;                 // no scoring after the match is decided
  victim.alive = false; victim.deaths++; victim.respT = RESPAWN;
  burst(victim.x, victim.y, victim.color, 40); sfxDie();
  if(victim.local || (killer && killer.local)) freezeT = 0.05;   // tiny hit-stop for juice
  const suicide = killer === victim;
  if(suicide){
    pushFeed(`${victim.name} sniped themselves`);
  } else if(gmode === 'teams' && killer.team === victim.team){
    pushFeed(`${killer.name} teamkilled ${victim.name}`);   // shouldn't happen (ff off) but safe
  } else {
    killer.kills++;
    killer.matchExp += expForKill(victim.level);            // exp scales with the victim's level
    if(gmode === 'teams') teamScore[killer.team]++;
    sfxKill();
    pushFeed(`${killer.name} ${banked?'banked':'tagged'} ${victim.name}`);
    if(killer.local || victim.local){ shake(); flashScreen(killer.local ? killer.color : victim.color); }
  }
  // win check
  const val = gmode === 'teams' ? teamScore[killer && killer.team>=0 ? killer.team : 0] : (killer ? killer.kills : 0);
  if(!suicide && val >= target) matchEnd(killer);
}
function matchEnd(winner){
  if(state !== 'play') return;
  state = 'end'; roundLive = false; clearTimers();
  $('#announce').classList.remove('show');   // clearTimers cancels the announce auto-dismiss

    standings: players.map(p=>({name:p.name, kills:p.kills, team:p.team, color:p.color, matchExp:p.matchExp, level:p.level})),
    winnerTeam: gmode==='teams' ? (teamScore[0]>teamScore[1]?0:1) : -1,
    winnerName: winner ? winner.name : '' });

}

/* ================= bots ================= */
function nearestEnemy(p){
  let best = null, bd = 1e9;
  for(const q of players){ if(!q || q===p || !q.alive) continue; if(p.team>=0 && q.team===p.team) continue;
    const d = Math.hypot(q.x-p.x, q.y-p.y); if(d < bd){ bd = d; best = q; } }
  return best;
}
function botThink(p, dt){
  const b = p.bot, foe = nearestEnemy(p);
  b.retarget -= dt; b.dodge -= dt; b.wob += dt;
  let threat = null;
  for(const bl of bullets){ if(bl.owner === p.i && bl.b === 0) continue;
    if(p.team>=0 && players[bl.owner] && players[bl.owner].team===p.team) continue;
    const dx = p.x-bl.x, dy = p.y-bl.y, d = Math.hypot(dx,dy);
    if(d < 190 && (bl.vx*dx + bl.vy*dy)/d > 220){ threat = bl; break; } }
  if(threat && b.dodge <= -0.3 && Math.random() < b.skill*0.4){
    b.dodge = 0.24; const s = Math.random()<0.5?1:-1;
    b.dx = -threat.vy*s; b.dy = threat.vx*s; const m = Math.hypot(b.dx,b.dy)||1; b.dx/=m; b.dy/=m;
  }
  if(b.dodge > 0){ p.inX = b.dx; p.inY = b.dy; }
  else if(!foe){ p.inX = (WORLD.w/2 - p.x)/1000; p.inY = (WORLD.h/2 - p.y)/1000; }
  else {
    if(b.retarget <= 0){ b.retarget = rand(0.4, 0.9);
      const ang = rand(0,TAU), rad = rand(190, 420);
      b.tx = clamp(foe.x + Math.cos(ang)*rad, 60, WORLD.w-60);
      b.ty = clamp(foe.y + Math.sin(ang)*rad, 60, WORLD.h-60); }
    const dx = b.tx-p.x, dy = b.ty-p.y, d = Math.hypot(dx,dy);
    if(d > 30){ p.inX = dx/d; p.inY = dy/d; } else { p.inX = 0; p.inY = 0; }
  }
  p.wantShoot = false;
  if(foe){
    const wob = Math.sin(b.wob*3.1)*0.1/b.skill;
    const want = Math.atan2(foe.y-p.y, foe.x-p.x) + wob;
    const dA = angDiff(p.aim, want); p.aim += clamp(dA, -6*b.skill*dt, 6*b.skill*dt);
    if(Math.abs(dA) < 0.16 && p.cd <= 0 && p.ammo >= 1){
      const dist = Math.hypot(foe.x-p.x, foe.y-p.y), blocked = losBlocked(p.x,p.y,foe.x,foe.y);
      if(dist < 720 && Math.random() < (blocked?0.25:1)*b.skill*dt*8) p.wantShoot = true;
    }
  }
}

/* ================= combat ================= */
function fire(p){
  if(p.cd > 0 || p.ammo < 1 || !p.alive) return;
  const wb = p.ld.wbase;
  p.ammo--; p.cd = p.ld.cdBase;
  const spd = p.ld.bulletSpeed, big = !!wb.big, bmax = wb.bounce;
  const mk = (ang, sp) => bullets.push({
    x: p.x + Math.cos(ang)*(p.r+9), y: p.y + Math.sin(ang)*(p.r+9),
    px:0, py:0, vx: Math.cos(ang)*(sp||spd), vy: Math.sin(ang)*(sp||spd),
    r: big?9:4.5, owner: p.i, team: p.team, b:0, maxB: bmax, life: 2.6, c: p.color });
  if(wb.pattern === 'spread'){ const n = wb.n, sp = wb.spread;
    for(let i=0;i<n;i++) mk(p.aim - sp/2 + sp*i/(n-1)); }
  else if(wb.pattern === 'burst'){ mk(p.aim); p.burst = (wb.n||3)-1; p.burstT = 0.06; }
  else mk(p.aim);
  p.vx -= Math.cos(p.aim)*(big?110:70); p.vy -= Math.sin(p.aim)*(big?110:70);
  spark(p.x + Math.cos(p.aim)*(p.r+11), p.y + Math.sin(p.aim)*(p.r+11), '#fff', 4);
  sfxShoot();
}

/* ================= fx ================= */
const burst = fxWrap('bu', function(x, y, color, n=36){
  for(let i=0;i<n;i++){ const a = rand(0,TAU), v = rand(60, 520);
    parts.push({x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:rand(0.35,0.9), t:0, s:rand(2.5,7), c:color}); }
});
const spark = fxWrap('sk', function(x, y, color, n=8){
  for(let i=0;i<n;i++){ const a = rand(0,TAU), v = rand(40, 220);
    parts.push({x, y, vx:Math.cos(a)*v, vy:Math.sin(a)*v, life:rand(0.15,0.4), t:0, s:rand(1.5,3.5), c:color}); }
});
function shake(){ const s = $('#shake'); s.classList.remove('shaking'); void s.offsetWidth; s.classList.add('shaking'); }
function flashScreen(c){ const f = $('#flash'); f.style.background = c; f.classList.remove('on'); void f.offsetWidth; f.classList.add('on'); }

/* ================= input ================= */
const KEYS0 = { up:'KeyW', left:'KeyA', down:'KeyS', right:'KeyD' };
const KEYS1 = { up:'ArrowUp', left:'ArrowLeft', down:'ArrowDown', right:'ArrowRight' };
const SHOOT = ['Space','Enter','NumpadEnter','KeyF','ShiftRight'];
const touch = { stick:null, ox:0, oy:0, vx:0, vy:0, fires:new Set() };
function localInput(){
  let x = (held[KEYS0.right]?1:0)-(held[KEYS0.left]?1:0) + (held[KEYS1.right]?1:0)-(held[KEYS1.left]?1:0);
  let y = (held[KEYS0.down]?1:0)-(held[KEYS0.up]?1:0) + (held[KEYS1.down]?1:0)-(held[KEYS1.up]?1:0);
  x = clamp(x,-1,1); y = clamp(y,-1,1);
  let s = SHOOT.some(c => held[c]);
  if(touch.stick !== null){ x = touch.vx; y = touch.vy; }
  if(touch.fires.size) s = true;
  return { x, y, s };
}

/* ================= update ================= */
function tnow(){ return performance.now(); }
function update(dt){
  if(freezeT > 0){ freezeT -= dt; updateParts(dt); return; }
  if(mode === 'guest'){ guestUpdate(dt); updateParts(dt); return; }
  if(gmode === 'zombies'){ if(state==='play') updateZombies(dt); else { updateParts(dt); updateCamera(dt); } return; }
  if(state === 'play' && roundLive){
    for(const p of players){
      if(!p) continue;
      if(!p.alive){ p.respT -= dt; if(p.respT <= 0) spawnPlayer(p); continue; }
      // input
      if(p.bot) botThink(p, dt);
      else {
        let inp;
        if(mode === 'host' && !p.local){ const pr = netPeerFor(p.i); inp = pr ? pr.rin : {x:0,y:0,s:false}; }
        else inp = localInput();
        p.inX = inp.x; p.inY = inp.y; p.wantShoot = !!inp.s;
        if(p.inX || p.inY){ const want = Math.atan2(p.inY, p.inX);
          p.aim += clamp(angDiff(p.aim, want), -16*dt, 16*dt); }
      }
      // burst follow-up
      if(p.burst > 0){ p.burstT -= dt; if(p.burstT <= 0){ p.burstT = 0.06; p.burst--;
        const spd = p.ld.bulletSpeed; bullets.push({ x:p.x+Math.cos(p.aim)*(p.r+9), y:p.y+Math.sin(p.aim)*(p.r+9),
          px:0,py:0, vx:Math.cos(p.aim)*spd, vy:Math.sin(p.aim)*spd, r:4.5, owner:p.i, team:p.team, b:0, maxB:p.ld.wbase.bounce, life:2.6, c:p.color });
        sfxShoot(); } }
      // physics
      const il = Math.hypot(p.inX, p.inY) || 1;
      p.vx += (p.inX/il) * p.ld.accel * dt;
      p.vy += (p.inY/il) * p.ld.accel * dt;
      const sp = Math.hypot(p.vx, p.vy);
      if(sp > p.ld.maxV){ const k = p.ld.maxV/sp; p.vx*=k; p.vy*=k; }
      const damp = Math.max(0, 1 - 7*dt); p.vx*=damp; p.vy*=damp;
      p.x += p.vx*dt; p.y += p.vy*dt;
      if(p.x < p.r){ p.x = p.r; p.vx = Math.max(0,p.vx); }
      if(p.x > WORLD.w-p.r){ p.x = WORLD.w-p.r; p.vx = Math.min(0,p.vx); }
      if(p.y < p.r){ p.y = p.r; p.vy = Math.max(0,p.vy); }
      if(p.y > WORLD.h-p.r){ p.y = WORLD.h-p.r; p.vy = Math.min(0,p.vy); }
      for(const wl of walls){ const push = circleRectPush(p.x, p.y, p.r, wl);
        if(push){ p.x += push.x; p.y += push.y; if(push.x) p.vx = 0; if(push.y) p.vy = 0; } }
      p.cd -= dt; p.shield -= dt;
      if(p.ammo < p.ld.maxAmmo){ p.regen += dt; if(p.regen >= p.ld.regenTime){ p.ammo++; p.regen = 0; } }
      if(p.wantShoot) fire(p);
    }
    // player-player soft separation
    for(let i=0;i<players.length;i++) for(let j=i+1;j<players.length;j++){
      const a = players[i], c = players[j]; if(!a.alive||!c.alive) continue;
      const dx = c.x-a.x, dy = c.y-a.y, d = Math.hypot(dx,dy);
      if(d>0 && d < a.r+c.r){ const k=(a.r+c.r-d)/d/2; a.x-=dx*k; a.y-=dy*k; c.x+=dx*k; c.y+=dy*k; } }
    // bullets
    const kills = [];
    for(const bl of bullets){
      bl.px = bl.x; bl.py = bl.y;
      for(let s=0; s<2 && bl.life>0; s++){
        const h = dt/2; bl.x += bl.vx*h; bl.y += bl.vy*h;
        if(bl.x < bl.r){ bl.x=bl.r; bl.vx=Math.abs(bl.vx); bl.b++; sfxBounce(); }
        else if(bl.x > WORLD.w-bl.r){ bl.x=WORLD.w-bl.r; bl.vx=-Math.abs(bl.vx); bl.b++; sfxBounce(); }
        if(bl.y < bl.r){ bl.y=bl.r; bl.vy=Math.abs(bl.vy); bl.b++; sfxBounce(); }
        else if(bl.y > WORLD.h-bl.r){ bl.y=WORLD.h-bl.r; bl.vy=-Math.abs(bl.vy); bl.b++; sfxBounce(); }
        for(const wl of walls){ const push = circleRectPush(bl.x, bl.y, bl.r, wl);
          if(push){ bl.x+=push.x; bl.y+=push.y; if(Math.abs(push.x)>Math.abs(push.y)) bl.vx=-bl.vx; else bl.vy=-bl.vy;
            bl.b++; sfxBounce(); spark(bl.x, bl.y, bl.c, 3); } }
        if(bl.b > bl.maxB){ bl.life = 0; spark(bl.x, bl.y, bl.c, 5); }
        for(const p of players){ if(!p.alive || bl.life<=0) continue;
          if(bl.owner === p.i && bl.b === 0) continue;
          if(p.team>=0 && bl.team===p.team && bl.owner !== p.i) continue;   // friendly fire off
          if(Math.hypot(p.x-bl.x, p.y-bl.y) < p.r + bl.r){
            if(p.shield > 0){ bl.life = 0; spark(bl.x, bl.y, '#fff', 6); continue; }
            bl.life = 0; kills.push({ victim:p, killer:players[bl.owner], banked: bl.b>0 }); } }
      }
      bl.life -= dt;
    }
    bullets = bullets.filter(b => b.life > 0);
    // resolve kills (dedupe victim)
    const done = new Set();
    for(const k of kills){ if(done.has(k.victim.i)) continue; done.add(k.victim.i);
      onKill(k.victim, k.killer || k.victim, k.banked); }
  }
  for(const f of feed) f.t += dt;
  updateParts(dt);
  updateCamera(dt);
}
function updateParts(dt){
  parts = parts.filter(p => (p.t += dt) < p.life);
  for(const p of parts){ p.x += p.vx*dt; p.y += p.vy*dt; p.vx*=0.98; p.vy*=0.98; }
}
function camTarget(){
  const p = players[me];
  if(p && isFinite(p.x) && isFinite(p.y)) return { x: p.x, y: p.y };
  return { x: WORLD.w/2, y: WORLD.h/2 };
}
function updateCamera(dt){
  computeView();
  const t = camTarget();
  const k = Math.min(1, dt*6);
  const vw = W/VIEW, vh = H/VIEW;
  cam.x += (t.x - vw/2 - cam.x) * k;
  cam.y += (t.y - vh/2 - cam.y) * k;
  cam.x = WORLD.w <= vw ? (WORLD.w - vw)/2 : clamp(cam.x, 0, WORLD.w - vw);
  cam.y = WORLD.h <= vh ? (WORLD.h - vh)/2 : clamp(cam.y, 0, WORLD.h - vh);
}
let VIEW = 1;
function computeView(){ // zoom so a comfortable slice of the world is visible
  const want = Math.min(W, H) < 620 ? 900 : 1350; // world units across the smaller screen dim
  VIEW = clamp(Math.min(W, H) / want, 0.42, 1);
}

/* ================= guest ================= */
function guestUpdate(dt){
  for(const p of players){ if(!p || p.tx === undefined) continue;
    if(!p.init){ p.x=p.tx; p.y=p.ty; p.init=true; }
    const k = Math.min(1, dt*18); p.x += (p.tx-p.x)*k; p.y += (p.ty-p.y)*k;
    p.aim += angDiff(p.aim, p.taim)*Math.min(1, dt*20); }
  for(const bl of bullets){ bl.x += bl.vx*dt; bl.y += bl.vy*dt; bl.px = bl.x-bl.vx*0.02; bl.py = bl.y-bl.vy*0.02; }
  for(const f of feed) f.t += dt;
  updateCamera(dt);
}

/* ================= draw ================= */
function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  if(state === 'menu' || state === 'loadout' || state === 'lobby' || state === 'room' || state === 'wait' || state === 'shop' || state === 'ranked' || state === 'account'){ drawParticlesScreen(); return; }
  computeView();
  ctx.save();
  ctx.scale(VIEW, VIEW);
  ctx.translate(-cam.x, -cam.y);
  // world border
  ctx.strokeStyle = 'rgba(120,140,200,.4)'; ctx.lineWidth = 3/VIEW;
  ctx.strokeRect(0,0,WORLD.w,WORLD.h);
  // walls
  for(const wl of walls){ ctx.fillStyle = '#12182a'; ctx.strokeStyle = '#2b3452'; ctx.lineWidth = 2/VIEW;
    ctx.fillRect(wl.x,wl.y,wl.w,wl.h); ctx.strokeRect(wl.x,wl.y,wl.w,wl.h); }
  if(gmode === 'zombies') drawZombieEntities();
  // bullets
  for(const bl of bullets){ ctx.strokeStyle = bl.c; ctx.lineWidth = bl.r*1.3; ctx.lineCap='round';
    ctx.globalAlpha = 0.4; ctx.beginPath(); ctx.moveTo(bl.px,bl.py); ctx.lineTo(bl.x,bl.y); ctx.stroke(); ctx.globalAlpha=1;
    ctx.save(); ctx.shadowColor = bl.c; ctx.shadowBlur = 12; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(bl.x,bl.y,bl.r,0,TAU); ctx.fill(); ctx.restore(); }
  // players
  for(const p of players){ if(!p || !p.alive) continue;
    ctx.save(); ctx.translate(p.x, p.y);
    if(p.shield > 0){ ctx.strokeStyle = `rgba(255,255,255,${clamp(p.shield,0,0.8)})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(0,0,p.r+6,0,TAU); ctx.stroke(); }
    ctx.rotate(p.aim);
    ctx.shadowColor = p.color; ctx.shadowBlur = 16; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.moveTo(18,0); ctx.lineTo(-12,-11); ctx.lineTo(-6,0); ctx.lineTo(-12,11); ctx.closePath(); ctx.fill();
    ctx.restore();
    // name / marker
    ctx.textAlign='center';
    if(p.local){ ctx.fillStyle='#fff'; ctx.font=`700 ${13/VIEW*VIEW|0 || 13}px var(--mono)`;
      ctx.font='700 13px ui-monospace,Menlo,monospace'; ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.fillText('▼', p.x, p.y - p.r - 12); }
    else { ctx.font='600 12px ui-monospace,Menlo,monospace'; ctx.fillStyle='rgba(238,242,255,.6)';
      ctx.fillText(p.name, p.x, p.y - p.r - 9); }
    // ammo pips
    for(let a=0;a<p.ld.maxAmmo && a<9;a++){ ctx.fillStyle = a < p.ammo ? p.color : 'rgba(90,100,130,.4)';
      ctx.fillRect(p.x - (p.ld.maxAmmo*4) + a*8, p.y + p.r + 7, 5, 3); }
  }
  drawParticlesWorld();
  ctx.restore();
  // screen HUD
  drawHUD();
  drawMinimap();
  drawTouch();
}
function drawZombieEntities(){
  // citizens
  for(const c of citizens){ if(!c.alive) continue;
    const conv = c.converting>0;
    ctx.fillStyle = conv ? `rgba(255,${120+Math.sin(c.wob*6)*80|0},80,1)` : '#7cff9b';
    ctx.shadowColor = conv ? '#ff7a3c' : '#3ddc84'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, TAU); ctx.fill(); ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(4,8,14,.6)'; ctx.beginPath(); ctx.arc(c.x, c.y-1, c.r*0.5, 0, TAU); ctx.fill();
  }
  // zombies
  for(const z of zombies){ if(!z.alive) continue;
    ctx.save(); ctx.translate(z.x, z.y);
    ctx.shadowColor = z.boss ? '#ff9f1c' : '#6ab04c'; ctx.shadowBlur = z.boss?20:10;
    ctx.fillStyle = z.boss ? '#b56bff' : '#5a8f3c';
    ctx.beginPath(); ctx.arc(0,0,z.r,0,TAU); ctx.fill();
    ctx.shadowBlur = 0; ctx.fillStyle = z.boss ? '#ff9f1c' : '#89c559';
    ctx.beginPath(); ctx.arc(-z.r*0.3,-z.r*0.2,z.r*0.22,0,TAU); ctx.arc(z.r*0.3,-z.r*0.2,z.r*0.22,0,TAU); ctx.fill();
    ctx.restore();
    if(z.boss){ // hp bar
      const bw=z.r*2.2, f=z.hp/z.maxhp;
      ctx.fillStyle='rgba(4,8,14,.8)'; ctx.fillRect(z.x-bw/2, z.y-z.r-16, bw, 6);
      ctx.fillStyle='#ff9f1c'; ctx.fillRect(z.x-bw/2, z.y-z.r-16, bw*f, 6);
    }
  }
}
function drawParticlesWorld(){ for(const p of parts){ ctx.globalAlpha = clamp(1-p.t/p.life,0,1);
  ctx.fillStyle = p.c; ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s); } ctx.globalAlpha=1; }
function drawParticlesScreen(){ for(const p of parts){ ctx.globalAlpha = clamp(1-p.t/p.life,0,1);
  ctx.fillStyle = p.c; ctx.fillRect(p.x-p.s/2, p.y-p.s/2, p.s, p.s); } ctx.globalAlpha=1; }
function drawHUD(){
  ctx.textAlign = 'left';
  if(gmode === 'zombies' && campaign){
    const alive = citizens.filter(c=>c.alive).length;
    ctx.textAlign='center'; ctx.font='700 12px ui-monospace,monospace';
    ctx.fillStyle = campaign.wave>=campaign.maxWave ? '#ff9f1c' : '#8b93a8';
    ctx.fillText(`WAVE ${campaign.wave} / ${campaign.maxWave}${campaign.wave>=campaign.maxWave?' · BOSS':''}`, W/2, 26);
    // citizens alive vs goal
    ctx.textAlign='left'; ctx.font='900 italic 15px system-ui,sans-serif';
    ctx.fillStyle = alive>=campaign.goal ? '#7cff9b' : '#ff5c5c';
    ctx.fillText(`🧍 ${alive}`, 16, 30);
    ctx.font='600 11px ui-monospace,monospace'; ctx.fillStyle='#8b93a8';
    ctx.fillText(`/ ${campaign.goal} needed`, 60, 30);
    // lives (top-right)
    ctx.textAlign='right'; ctx.font='900 italic 15px system-ui,sans-serif'; ctx.fillStyle='#ff2d55';
    ctx.fillText('❤'.repeat(Math.max(0,campaign.lives+1)) || '—', W-16, 30);
    // kill feed
    ctx.textAlign='left'; ctx.font='600 12px ui-monospace,monospace';
    let fy = H - 16 - (isTouch?70:0);
    for(let i=feed.length-1;i>=0;i--){ const f=feed[i]; const a=clamp(3.5-f.t,0,1); if(a<=0) continue;
      ctx.globalAlpha=a; ctx.fillStyle='#c9d2e6'; ctx.fillText(f.txt, 16, fy); fy-=18; }
    ctx.globalAlpha=1;
    const you=players[me];
    if(you && !you.alive && state==='play'){ ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)';
      ctx.font='900 italic 22px system-ui,sans-serif';
      ctx.fillText(campaign && campaign.lives>0 ? 'RESPAWNING…' : 'DOWN — allies fighting on', W/2, H/2); }
    return;
  }
  // score banner top-center
  ctx.font = '900 italic 16px system-ui,sans-serif'; ctx.textAlign='center';
  if(gmode === 'teams'){
    ctx.fillStyle = TEAM_COLORS[0]; ctx.textAlign='right'; ctx.fillText(teamScore[0], W/2-46, 30);
    ctx.fillStyle = '#8b93a8'; ctx.textAlign='center'; ctx.font='700 11px ui-monospace,monospace';
    ctx.fillText(`FIRST TO ${target}`, W/2, 30);
    ctx.fillStyle = TEAM_COLORS[1]; ctx.textAlign='left'; ctx.font='900 italic 16px system-ui,sans-serif';
    ctx.fillText(teamScore[1], W/2+46, 30);
  } else {
    const lead = players.filter(Boolean).reduce((m,p)=>p.kills>m?p.kills:m,0);
    ctx.fillStyle='#8b93a8'; ctx.font='700 11px ui-monospace,monospace';
    ctx.fillText(`FREE-FOR-ALL · FIRST TO ${target} · LEADER ${lead}`, W/2, 26);
  }
  // leaderboard top-right
  const rank = players.filter(Boolean).slice().sort((a,b)=> (gmode==='teams'? b.kills-a.kills : b.kills-a.kills));
  ctx.textAlign='right';
  let ly = 52;
  const top = rank.slice(0, 5);
  if(players[me] && !top.includes(players[me])) top.push(players[me]);
  for(const p of top){ ctx.font = p.local ? '900 italic 13px system-ui,sans-serif' : '600 13px ui-monospace,monospace';
    ctx.fillStyle = p.color; ctx.fillText(`${p.name}`, W-52, ly);
    ctx.fillStyle = '#eef2ff'; ctx.font='700 13px ui-monospace,monospace'; ctx.fillText(p.kills, W-16, ly);
    ly += 20; }
  // kill feed bottom-left
  ctx.textAlign='left'; ctx.font='600 12px ui-monospace,monospace';
  let fy = H - 16 - (isTouch?70:0);
  for(let i=feed.length-1;i>=0;i--){ const f=feed[i]; const a = clamp(3.5 - f.t, 0, 1);
    if(a<=0) continue; ctx.globalAlpha = a; ctx.fillStyle='#c9d2e6'; ctx.fillText(f.txt, 16, fy); fy -= 18; }
  ctx.globalAlpha = 1;
  // respawn banner for local
  const lp = players[me];
  if(lp && !lp.alive && state==='play'){ ctx.textAlign='center'; ctx.fillStyle='rgba(255,255,255,.85)';
    ctx.font='900 italic 22px system-ui,sans-serif'; ctx.fillText('RESPAWNING…', W/2, H/2); }
}
function drawMinimap(){
  const mw = clamp(W*0.16, 120, 200), mh = mw * WORLD.h/WORLD.w;
  const mx = W - mw - 14, my = H - mh - 14;
  ctx.globalAlpha = 0.85; ctx.fillStyle = 'rgba(6,8,15,.8)'; ctx.fillRect(mx,my,mw,mh);
  ctx.strokeStyle = 'rgba(120,140,200,.4)'; ctx.lineWidth=1; ctx.strokeRect(mx,my,mw,mh);
  const sx = mw/WORLD.w, sy = mh/WORLD.h;
  ctx.fillStyle = 'rgba(43,52,82,.9)';
  for(const wl of walls) ctx.fillRect(mx+wl.x*sx, my+wl.y*sy, Math.max(1,wl.w*sx), Math.max(1,wl.h*sy));
  if(gmode === 'zombies'){
    for(const c of citizens){ if(!c.alive) continue; ctx.fillStyle = c.converting>0?'#ff7a3c':'#7cff9b';
      ctx.fillRect(mx+c.x*sx-1, my+c.y*sy-1, 2, 2); }
    for(const z of zombies){ if(!z.alive) continue; ctx.fillStyle = z.boss?'#ff9f1c':'#ff5c5c';
      ctx.beginPath(); ctx.arc(mx+z.x*sx, my+z.y*sy, z.boss?3:1.6, 0, TAU); ctx.fill(); }
  }
  for(const p of players){ if(!p || !p.alive) continue;
    ctx.fillStyle = p.color; const d = p.local ? 4 : 2.6;
    ctx.beginPath(); ctx.arc(mx+p.x*sx, my+p.y*sy, d, 0, TAU); ctx.fill();
    if(p.local){ ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke(); } }
  ctx.globalAlpha = 1;
}
function drawTouch(){
  if(touch.stick !== null){ ctx.strokeStyle='rgba(238,242,255,.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(touch.ox,touch.oy,46,0,TAU); ctx.stroke();
    ctx.fillStyle='rgba(238,242,255,.5)'; ctx.beginPath(); ctx.arc(touch.ox+touch.vx*36, touch.oy+touch.vy*36,16,0,TAU); ctx.fill(); }
  if(isTouch && state==='play'){ ctx.fillStyle='rgba(139,147,168,.4)'; ctx.font='700 11px ui-monospace,monospace';
    ctx.textAlign='center'; ctx.fillText('◈ MOVE', W*0.25, H-24); ctx.fillText('✛ FIRE', W*0.75, H-24); }
}

function statPool(){ return STAT_POOL_BASE + (save.level - 1); }   // +1 point per level
function allocUsed(){ return Object.values(save.alloc).reduce((a,b)=>a+b,0); }

/* ---- shop (the reliable legendary source: buy with credits) ---- */
let shopStock = null;
function genShopStock(){
  const stock = [];
  for(let i=0;i<4;i++){ const kind = Math.random()<0.5?'weapon':'armor'; stock.push(rollItem(kind, 1, null, 3)); } // green→purple
  stock.push(rollItem('weapon', 4, null, 4));   // guaranteed legendary weapon
  stock.push(rollItem('armor',  4, null, 4));   // guaranteed legendary armor

let endStandings = null;   // guest: standings without live x/y (kept off `players` so the camera never sees NaN)
function capStash(){ if(save.inv.length>80){ const keep=new Set([save.equip.weapon,save.equip.armor].filter(x=>x!=null));
  const eq=save.inv.filter(i=>keep.has(i.id)), rest=save.inv.filter(i=>!keep.has(i.id));
  save.inv = rest.slice(-(80-eq.length)).concat(eq); } }
function applyProgression(gained, won, place, opts){
  opts = opts || {};
  const before = save.level;
  save.exp += Math.max(0, Math.round(gained)); save.level = levelFromExp(save.exp);
  const creditsGained = opts.credits != null ? opts.credits : (14 + Math.round(gained/4) + (won?45:0));
  save.credits += creditsGained;
  save.matches++; if(won) save.wins++;
  const drops = rollLoot(place, won, gained, opts);
  drops.forEach(d => save.inv.push(d)); capStash(); persist();
  return { leveled: save.level-before, before, creditsGained, drops };
}
function progressStrip(prog, gained){

function rollLoot(place, won, gained, opts){
  opts = opts || {};
  const boost = clamp(Math.floor((gained||0)/140), 0, 3);
  const minTier = clamp((won?1:0) + boost, 0, DROP_MAX_TIER);
  const n = won ? (Math.random()<0.5?2:3) : (place<=3 ? 2 : 1);
  const out = [];
  if(opts.legendary) out.push(rollItem(pick(['weapon','armor']), 4, null, 4));   // guaranteed orange (campaign boss)
  for(let i=0;i<n;i++){ const kind = Math.random()<0.55 ? 'weapon' : 'armor';
    out.push(rollItem(kind, Math.random()<0.5 ? minTier : Math.max(0,minTier-1), null, DROP_MAX_TIER)); }
  return out;
}

async function submitRanked(){   // host only, after a ranked brawl ends — accounts only, token-verified

  for(const pr of net.peers){ if(pr.token) humans.push({ token:pr.token, handle:pr.handle||'Player', aid:pr.aid, kills:(players[pr.idx]?players[pr.idx].kills:0) }); }

  humans.sort((a,b)=> b.kills-a.kills);                    // placement = winner first
  try{
    const r = await fetch(RANK_URL, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ results: humans.map(h=>({token:h.token, handle:h.handle})) }) });

    netBroadcast({ t:'rankres', ratings: j.ratings });     // tell guests their new ratings
    const mine = account && j.ratings.find(x=>x.id===account.aid); if(mine){ showRankDelta(mine.rating, mine.delta); account.rating = mine.rating; }

function lobbyMsg(raw){

    if(m.t==='room'){ lobby.rooms.set(m.from, {name:String(m.name||'room').slice(0,22), gm:m.gm||'ffa', n:m.n||1, rk:!!m.rk, seen:Date.now()}); renderRoomList(); }
    else if(m.t==='gone'){ if(lobby.rooms.delete(m.from)) renderRoomList(); }
    return;
  }

    if(m.t==='knock'){ hostAccept(String(m.from)); }
    else if(m.t==='answer' && m.to===lobby.cid && lobby.pending.has(m.from)){
      const pr = lobby.pending.get(m.from); pr.pc.setRemoteDescription(m.sdp).catch(()=>{}); }
    return;
  }
  if(lobby.join && env.group === sigGroup(lobby.join)){
    if(m.to !== lobby.cid) return;
    if(m.t==='full'){ joinReset('room is full — pick another'); return; }
    if(m.t==='offer' && m.from===lobby.join) joinOffer(lobby.join, m.sdp);

}

async function hostAccept(jid){
  if(!lobby || !lobby.hosting || lobby.starting) return;   // no late joins once the match starts
  if(lobby.pending.has(jid) || lobby.seats.includes(jid)) return;
  if(1 + lobby.seats.length >= MAXP){ wpsTo(sigGroup(lobby.cid), {t:'full', from:lobby.cid, to:jid}); return; }
  try{
    const pc = newPC(); const ch = pc.createDataChannel('g', {ordered:true});
    lobby.pending.set(jid, { pc, ch });
    ch.onopen = () => hostSeat(jid, pc, ch);
    pc.onconnectionstatechange = () => { if(['failed','disconnected','closed'].includes(pc.connectionState)){
      lobby && lobby.pending.delete(jid); } };
    await pc.setLocalDescription(await pc.createOffer());
    await iceDone(pc);
    if(!lobby || !lobby.pending.has(jid)) return;
    wpsTo(sigGroup(lobby.cid), {t:'offer', from:lobby.cid, to:jid, sdp: pc.localDescription});
  }catch(e){ lobby && lobby.pending.delete(jid); }
}
function hostSeat(jid, pc, ch){
  if(!lobby || !lobby.hosting){ try{ pc.close(); }catch(e){} return; }
  lobby.pending.delete(jid);
  if(lobby.seats.includes(jid) || 1+lobby.seats.length >= MAXP){ try{ pc.close(); }catch(e){} return; }
  const idx = 1 + lobby.seats.length;          // host is seat 0; assign now so welcome is reliable
  lobby.seats.push(jid);
  if(!lobby._chans) lobby._chans = new Map();
  lobby._chans.set(jid, { pc, ch, idx });
  try{ ch.send(JSON.stringify({t:'welcome', idx, world:WORLD})); }catch(e){}  // channel just opened → guest is listening
  ch.onmessage = e => { try{ hostRoomMsg(jid, JSON.parse(e.data)); }catch(err){} };
  pc.onconnectionstatechange = () => {                     // challenger bails before START → free the seat
    if(!lobby || lobby.starting) return;
    if(['failed','disconnected','closed'].includes(pc.connectionState)){
      lobby.seats = lobby.seats.filter(s=>s!==jid);
      if(lobby._chans) lobby._chans.delete(jid);
      announceRoom(); if(state==='room') renderRoom();
    }
  };
  announceRoom();
  if(state === 'room') renderRoom();
  lobbyStatus(`${lobby.seats.length} challenger${lobby.seats.length>1?'s':''} joined — start when ready`);
  if(1 + lobby.seats.length >= MAXP) hostStart();
}
function hostRoomMsg(jid, m){   // pre-game: capture the guest's chosen loadout + level
  if(m && m.t==='ld' && lobby && lobby._chans && lobby._chans.has(jid))
    lobby._chans.get(jid).ld = { alloc:m.alloc, w:m.w, a:m.a, level:m.level, pid:m.pid, handle:m.handle, token:m.token, aid:m.aid };
}
function hostStart(){
  if(!lobby || !lobby.hosting || lobby.starting) return;
  lobby.starting = true;
  wpsTo('rooms', {t:'gone', from:lobby.cid});
  clearInterval(lobby.hb);
  mode = 'host'; me = 0;
  net = { role:'host', peers:[] };
  const coop = gmode === 'zombies';
  const seated = lobby._chans ? [...lobby._chans.values()] : [];   // seat order
  players = new Array(MAXP);
  players[0] = makePlayer(0, { local:true, name:coop?'You':'Host', level:save.level, ld: resolveLoadout(save.alloc, equippedWeapon(), equippedArmor()) });
  for(const cn of seated){ const idx = cn.idx; if(idx<1 || idx>=MAXP || players[idx]) continue;
    const pr = { pc:cn.pc, ch:cn.ch, idx, rin:{x:0,y:0,s:false}, ready:true, pid:cn.ld&&cn.ld.pid, handle:cn.ld&&cn.ld.handle, token:cn.ld&&cn.ld.token, aid:cn.ld&&cn.ld.aid };
    const ld = cn.ld ? resolveLoadout(cn.ld.alloc, cn.ld.w, cn.ld.a) : botLoadout();  // honor the guest's build
    players[idx] = makePlayer(idx, { name:(coop?'Ally ':'Rival ')+idx, level: (cn.ld && cn.ld.level) || save.level, ld });
    const dropHandler = coop
      ? () => { pr.ready = false; }   // co-op: a dropped ally just stops shooting (no bot takeover of a defender)
      : () => { pr.ready = false; const pl = players[idx];
          if(pl && !pl.bot){ pl.bot = {retarget:0,tx:0,ty:0,dodge:0,dx:0,dy:0,wob:rand(0,9),skill:1}; pl.wantShoot = false; pushFeed(`${pl.name} disconnected — bot took over`); } };
    cn.ch.onmessage = e => { try{ const m=JSON.parse(e.data);
      if(m.t==='in'){ pr.rin = {x:+m.x||0,y:+m.y||0,s:!!m.s}; } else if(m.t==='bye'){ dropHandler(); } }catch(err){} };
    cn.pc.onconnectionstatechange = () => { if(['failed','disconnected','closed'].includes(cn.pc.connectionState)) dropHandler(); };
    net.peers.push(pr);
    try{ cn.ch.send(JSON.stringify({t:'welcome', idx, world:WORLD})); }catch(e){}   // resend for safety
  }
  if(coop){
    players = players.filter(Boolean);   // co-op: just the humans, no bot fill
    players.forEach((p,i)=>{ const old = p.i; p.i = i;   // compact 0..N-1 (heals any seat gap)
      const pr = net.peers.find(x=>x.idx===old); if(pr){ pr.idx = i;
        try{ pr.ch.send(JSON.stringify({t:'welcome', idx:i, world:WORLD})); }catch(e){} } });
    beginCampaign();
  } else {
    for(let i=0;i<MAXP;i++) if(!players[i]) players[i] = makePlayer(i, { bot:true, name:pick(BOT_NAMES)+i, skill:rand(0.8,1.2), level: clamp(save.level+irand(-2,3),1,99), ld: botLoadout() });
    beginMatch();
  }
}

      renderCampaignEnd({ won:m.won, saved:m.saved, gained:mine.matchExp||0, kills:mine.kills||0,
        citizensStart:m.citizensStart, goal:m.goal, maxWave:m.maxWave, wave:m.wave,
        standings: m.standings.map((s,i)=> s?{name:s.name,color:s.color,kills:s.kills,local:(i===net.me)}:null).filter(Boolean) });
      break;
    }
    case 'feed': feed.push({txt:m.x, t:0}); if(feed.length>6) feed.shift(); break;
    case 'ann': showAnnounce(m.h, m.ms); break;
    case 'fx': if(FXMAP[m.n]) FXMAP[m.n](...(m.a||[])); break;
    case 'end':
      state='end'; teamScore = m.teamScore || teamScore; rankedMode = !!m.ranked;
      // keep `players` (ghosts with x/y) intact for the camera; standings go in a side array
      endStandings = m.standings.map((s,i)=>({ i, name:s.name, kills:s.kills, team:s.team, color:s.color, matchExp:s.matchExp||0, level:s.level, local:(i===net.me) }));
      renderEnd(null);
      break;
    case 'rankres': { const mine = account && (m.ratings||[]).find(x=>x.id===account.aid); if(mine){ showRankDelta(mine.rating, mine.delta); account.rating = mine.rating; } break; }
    case 'bye': guestDropped(); break;
  }
}

/* ================= keyboard / touch ================= */
addEventListener('keydown', e => {
  const tag = e.target && e.target.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT'){ if(e.code==='Escape') e.target.blur(); return; }
  if(e.metaKey||e.ctrlKey) return;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter','NumpadEnter','Slash'].includes(e.code)) e.preventDefault();
  audioInit();
  held[e.code] = true;
  if(e.repeat) return;
  if(e.code==='Escape'){
    if(state==='room'){ lobbyCleanup(); renderLobby(); }
    else if(state==='loadout'||state==='lobby'||state==='ranked'||state==='account'){ toMenu(); }
    else if(state==='shop'){ openLoadout('view'); }
    else if(state==='play' || state==='wait' || state==='end'){ netCloseAll(true); toMenu(); }
    return;
  }
  if(state!=='play' && (e.code==='Enter'||e.code==='NumpadEnter')){
    const el = document.activeElement; if(el && el.classList && el.classList.contains('mbtn')){ el.click(); return; } }
  if(state==='menu'){
    if(e.code==='Space') openLoadout('solo');
    else if(e.code==='KeyZ') startCampaign();
    else if(e.code==='KeyO'){ rankedMode=false; renderLobby(); }
    else if(e.code==='KeyL') openLoadout('view');
    else if(e.code==='KeyB') openShop();
    else if(e.code==='KeyR') renderRanked();
    else if(e.code==='KeyA') renderAccount();
  } else if(state==='end'){
    if(e.code==='Space'){ if(mode==='guest'){ netCloseAll(true); renderLobby(); } else if(mode==='host') hostRematch(); else if(gmode==='zombies') startCampaign(); else startSolo(); }
    else if(e.code==='KeyL') openLoadout('view');
    else if(e.code==='KeyM'){ netCloseAll(true); toMenu(); }
  }
});
addEventListener('keyup', e => { held[e.code] = false; });
addEventListener('blur', () => { for(const k in held) held[k]=false; });
addEventListener('pointerdown', e => {
  audioInit();
  if(e.pointerType!=='touch') return;
  if(state!=='play') return;
  if(e.target.closest && e.target.closest('button,textarea,input,.mbtn')) return;
  if(e.clientX < W*0.5 && touch.stick===null){ touch.stick=e.pointerId; touch.ox=e.clientX; touch.oy=e.clientY; touch.vx=0; touch.vy=0; }
  else touch.fires.add(e.pointerId);
}, {passive:true});
addEventListener('pointermove', e => { if(e.pointerId!==touch.stick) return;
  let dx=(e.clientX-touch.ox)/44, dy=(e.clientY-touch.oy)/44; const m=Math.hypot(dx,dy);
  if(m>1){ dx/=m; dy/=m; } touch.vx = m<0.22?0:dx; touch.vy = m<0.22?0:dy; }, {passive:true});
const pEnd = e => { if(e.pointerId===touch.stick){ touch.stick=null; touch.vx=0; touch.vy=0; } touch.fires.delete(e.pointerId); };
addEventListener('pointerup', pEnd, {passive:true});
addEventListener('pointercancel', pEnd, {passive:true});
addEventListener('touchmove', e => { if(state==='play') e.preventDefault(); }, {passive:false});
addEventListener('contextmenu', e => { if(state==='play') e.preventDefault(); });
addEventListener('beforeunload', () => { if(lobby && lobby.hosting && !lobby.starting)
  try{ lobby.ws.send(JSON.stringify({type:'sendToGroup', group:'rooms', dataType:'json', data:{t:'gone', from:lobby.cid}})); }catch(e){} });

/* ================= main loop ================= */
let lastT = 0;
function loop(t){
  const dt = Math.min(0.05, (t-lastT)/1000); lastT = t;
  update(dt);
  if(mode==='host' && net && state==='play'){
    net.snapAcc = (net.snapAcc||0) + dt;
    if(net.snapAcc >= 0.05){ net.snapAcc = 0;
      if(gmode==='zombies'){
        netBroadcast({ t:'zs', w:campaign?campaign.wave:0, lv:campaign?campaign.lives:0, ca: citizens.filter(c=>c.alive).length,
          p: players.map(p=>p?[p.x|0,p.y|0,+p.aim.toFixed(2), p.alive?1:0, p.shield>0?1:0, p.ammo, p.ld.maxAmmo, p.kills]:null),
          c: citizens.filter(c=>c.alive).map(c=>[c.x|0,c.y|0,c.converting>0?1:0]),
          z: zombies.map(z=>[z.x|0,z.y|0,z.boss?1:0,z.hp,z.maxhp]),
          b: bullets.map(b=>[b.x|0,b.y|0,b.vx|0,b.vy|0,b.r,b.owner]) });
      } else {
        netBroadcast({ t:'s', ts:teamScore,
          p: players.map(p=>[p.x|0,p.y|0,+p.aim.toFixed(2), p.alive?1:0, p.kills, p.shield>0?1:0, p.ammo, p.ld.maxAmmo]),
          b: bullets.map(b=>[b.x|0,b.y|0,b.vx|0,b.vy|0,b.r,b.owner]) });
      }
    }
  }
  if(mode==='guest' && net && net.ready){
    net.inAcc += dt; const cur = localInput();
    const ch = cur.x!==net.lastIn.x || cur.y!==net.lastIn.y || cur.s!==net.lastIn.s;
    if(ch || net.inAcc>0.1){ net.inAcc=0; net.lastIn=cur;
      try{ if(net.ch.readyState==='open') net.ch.send(JSON.stringify({t:'in', x:+cur.x.toFixed(2), y:+cur.y.toFixed(2), s:cur.s?1:0})); }catch(e){} }
  }
  if(state==='end' && Math.random()<0.25){ const cols=['#ffcf3f','#eef2ff','#00e5ff','#ff2d55'];
    const vw=W/VIEW; // world-space so it rains correctly through the camera transform
    parts.push({x:cam.x+rand(0,vw), y:cam.y-10, vx:rand(-30,30), vy:rand(60,150), life:rand(1.5,3), t:0, s:rand(3,8), c:pick(cols)}); }
  draw();
  requestAnimationFrame(loop);
}
loadSave();
requestAnimationFrame(loop);
toMenu();
tryResume().then(()=>{ if(state==='menu') toMenu(); });   // restore signed-in session + cloud save, then refresh the menu
</script>
